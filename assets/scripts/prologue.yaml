label: intro
nodes:
  - bg: "bg/room_morning.png"
  - music: "audio/soft_morning.mp3"
  - say: { who: "Аки", text: "Будильник не звонил. Странно. На улице — тишина." }
  - say: { who: "Аки", text: "Сегодня мне нужно в школу... Наверное." }
  - choice:
      text: "Что сделать?"
      options:
        - { text: "Выйти на улицу", jump: "street" }
        - { text: "Посмотреть в окно", jump: "window" }

---
label: window
nodes:
  - bg: "bg/window_view.jpg"
  - say: { who: "Аки", text: "Пустая улица, ни людей, ни машин. Как будто время остановилось." }
  - choice:
      text: "Решение"
      options:
        - { text: "Всё равно выйти", jump: "street" }
        - { text: "Остаться дома и позвонить другу", jump: "call_friend" }

---
label: call_friend
nodes:
  - bg: "bg/room_phone.jpg"
  - say: { who: "Аки", text: "Связи нет. Только короткие гудки и тишина." }
  - choice:
      text: "Дальше?"
      options:
        - { text: "Собраться и выйти", jump: "street" }
        - { text: "Сесть и подождать", jump: "ending_wait" }

---
label: street
nodes:
  - bg: "bg/street_empty.jpg"
  - music: "audio/empty_city.mp3"
  - say: { who: "Аки", text: "Пустые витрины, дрожит жаркий воздух. Часы над магазином остановились на 07:12." }
  - say: { who: "???", text: "Ты тоже заметил?" }
  - say: { who: "Аки", text: "Кто здесь?" }
  - say: { who: "Незнакомка", text: "Меня зовут Рин. Везде так. Хочешь проверить школу или площадь?" }
  - choice:
      text: "Куда идти?"
      options:
        - { text: "К школе", jump: "school_gate" }
        - { text: "На центральную площадь", jump: "square" }

---
label: school_gate
nodes:
  - bg: "bg/school_gate.jpg"
  - say: { who: "Рин", text: "Смотри. Электронные часы на проходной тоже 07:12." }
  - say: { who: "Аки", text: "Дверь приоткрыта. Зайдём?" }
  - choice:
      text: "Внутрь или обратно?"
      options:
        - { text: "Зайти внутрь", jump: "school_hall" }
        - { text: "Вернуться на улицу", jump: "square" }

---
label: school_hall
nodes:
  - bg: "bg/school_hall.jpg"
  - say: { who: "Аки", text: "Внутри прохладно. Шум — будто издалека." }
  - say: { who: "Рин", text: "Кабинет на втором этаже. Там радио." }
  - choice:
      text: "Подняться или исследовать холл?"
      options:
        - { text: "Подняться к радио", jump: "radio_room" }
        - { text: "Остаться и осмотреть холл", jump: "locker_note" }

---
label: locker_note
nodes:
  - bg: "bg/lockers.jpg"
  - say: { who: "Аки", text: "В шкафчике — записка: «Ключ к времени — там, где все встречаются»." }
  - say: { who: "Рин", text: "Площадь. Пойдём?" }
  - choice:
      text: "Куда дальше?"
      options:
        - { text: "К радио — вдруг новости", jump: "radio_room" }
        - { text: "На площадь", jump: "square" }

---
label: radio_room
nodes:
  - bg: "bg/radio_room.jpg"
  - music: "audio/static_signal.mp3"
  - say: { who: "Аки", text: "Шипение. И голос: «Если вы это слышите — соберитесь на площади к 07:12»." }
  - say: { who: "Рин", text: "Они тоже застряли. Значит, нам на площадь." }
  - choice:
      text: "Идём?"
      options:
        - { text: "На площадь", jump: "square" }

---
label: square
nodes:
  - bg: "bg/city_square.jpg"
  - say: { who: "Аки", text: "Фонтан замер в воздухе. На башенных часах — 07:12." }
  - say: { who: "Рин", text: "Тут должно быть что-то... Плита под часами." }
  - choice:
      text: "Что сделать?"
      options:
        - { text: "Поднять плиту вместе", jump: "lift_slab" }
        - { text: "Крикнуть, есть ли кто", jump: "shout" }

---
label: shout
nodes:
  - bg: "bg/city_square.jpg"
  - say: { who: "Аки", text: "Эхо возвращается, никого." }
  - say: { who: "Рин", text: "Попробуем плиту?" }
  - choice:
      text: "Решение"
      options:
        - { text: "Поднять плиту", jump: "lift_slab" }
        - { text: "Сдаться и уйти", jump: "ending_giveup" }

---
label: lift_slab
nodes:
  - bg: "bg/under_slab.jpg"
  - music: "audio/low_hum.mp3"
  - say: { who: "Аки", text: "Под плитой — старые механизмы и рычаг." }
  - say: { who: "Рин", text: "На табличке: «Синхронный пуск восстанавливает ход»." }
  - choice:
      text: "Как дернём?"
      options:
        - { text: "Считать и дёрнуть вместе", jump: "ending_resume" }
        - { text: "Дёрнуть сразу, не ждём", jump: "ending_loop" }

---
label: ending_resume
nodes:
  - bg: "bg/city_square.jpg"
  - music: "audio/resolution.mp3"
  - say: { who: "Аки", text: "Щёлк. Фонтан падает вниз, вода оживает. Часы переключаются на 07:13." }
  - say: { who: "Рин", text: "Получилось. Значит, мы успели." }
  - say: { who: "Аки", text: "Новый день начался." }
  - end: true

---
label: ending_loop
nodes:
  - bg: "bg/city_square.jpg"
  - music: "audio/tense_loop.mp3"
  - say: { who: "Аки", text: "Щёлк — и всё гаснет. Через миг я снова в комнате. На будильнике — 07:12." }
  - say: { who: "Аки", text: "Похоже, я сделал что-то не так." }
  - end: true

---
label: ending_giveup
nodes:
  - bg: "bg/alley.jpg"
  - music: "audio/quiet_end.mp3"
  - say: { who: "Аки", text: "Мы уходим с площади. Тишина тянется, как тень." }
  - say: { who: "Рин", text: "Если ничего не менять, ничто и не изменится." }
  - end: true

---
label: ending_wait
nodes:
  - bg: "bg/room_evening.jpg"
  - music: "audio/slow_fade.mp3"
  - say: { who: "Аки", text: "Я ждал до вечера. Время так и не пошло." }
  - end: true
