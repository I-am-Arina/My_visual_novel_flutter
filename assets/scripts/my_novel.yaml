label: start
nodes:
  - bg: "bg/prolog_room.png"
  - music: "audio/soft_music.mp3"
  - say: { who: "Главный герой", text: "Как же светло, нужно купить шторы..." }
  - say: { who: "Яков Гречнев", text: "Проснулся? Хорошо. Вопросов не задавай — просто слушай." }
  - say: { who: "Яков Гречнев", text: "Ты не в своей комнате. И не в своём мире. Добро пожаловать в аниме-реальность." }
  - say: { who: "Главный герой", text: "С-стой, подожди... Как это..." }
  - say: { who: "Яков Гречнев", text: "Нет времени болтать! Нас уже ждут. Первая локация — ФЭТ." }
  
  - bg: "bg/prolog_fet.png"
  - say: { who: "Главный герой", text: "Только не говорите, что и здесь нужно будет ходить на пары..." }
  - say: { who: "Яков Гречнев", text: "Ха-ха. Там твои временные «одногруппники» — персонажи аниме." }
  - say: { who: "Яков Гречнев", text: "Постарайся завоевать их ДОВЕРИЕ — оно твой билет ОБРАТНО. Ты меня понял?" }
  - say: { who: "Главный герой", text: "Д-да?" }
  - say: { who: "Яков Гречнев", text: "Вот и молодец. Отправляйся на второй этаж. Ты сразу поймёшь, как увидишь своих"}
  - say: { who: "Главный герой", text: "Какой же он всё-таки странный..." }

  # ----- Встреча с Марин Китагавой -----
  - bg: "bg/marin_alfa.png"
  - say: { who: "???", text: "Ой! Ты новенький? Я - Марин Китагава, приятно познакомиться" }
  - say: { who: "Главный герой", text: "Я - Главный герой. Мне тоже" }
  - say: { who: "Марин", text: "Я обожаю выискивать трешовые названия аниме!" }
  
  # ВОПРОС 1 (влияет на доверие)
  - choice:
      text: "Ты же смотришь аниме?"
      options:
        - { text: "Да, смотрю иногда...", jump: "question1_yes" }
        - { text: "Не особо...", jump: "question1_no" }

---
label: question1_yes
nodes:
  - say: { who: "Марин", text: "Ура! Настоящий отаку!" }
  - add_score: 1    # ← добавляем очко за правильный ответ
  - jump: "question2"

---
label: question1_no
nodes:
  - say: { who: "Марин", text: "Оу... Ну ничего, может, передумаешь" }
  - add_score: 0    # ← явно показываем, что очко не начислено
  - jump: "question2"

---
label: question2
nodes:
  - say: { who: "Марин", text: "В любом случае давай проверим, как ты шаришь!" }
  - say: { who: "Марин", text: "Какого названия аниме не существует?" }
  
  # ВОПРОС 2 (проверка знаний)
  - choice:
      text: "Выбери правильный ответ:"
      options:
        - { text: "Школьная жизнь с призраком", jump: "q2_wrong" }
        - { text: "Плачущий меч в руках забытого бога", jump: "q2_wrong" }
        - { text: "Свирепый банан", jump: "q2_wrong" }
        - { text: "В воскресенье у бога выходной", jump: "q2_wrong" }
        - { text: "Меня призвали в другой мир, но забыли выдать квест", jump: "q2_correct" }

---
label: q2_correct
nodes:
  - say: { who: "Марин", text: "Вау! Ты реально шаришь!" }
  - add_score: 1
  - jump: "after_marin_good"

---
label: q2_wrong
nodes:
  - say: { who: "Марин", text: "Ну ты нуб, конечно" }
  - add_score: 0
  - jump: "after_marin_bad"

---
label: after_marin_bad
nodes:
  - say: { who: "Марин", text: "На твоём месте я бы посмотрела несколько аниме..." }
  - say: { who: "Главный герой", text: "Я думаю, я сам разберусь"}
  - say: { who: "Марин", text: "Ха! А ты грубый. Но видела людей и по-грубее. Вон, как раз идёт один такой же..." }
  - say: { who: "Марин", text: "Вы найдёте общий язык" }
  - jump: "kenma_hello"

---
label: after_marin_good
nodes:
  - bg: "bg/marin_love.png"
  - say: { who: "Марин", text: "Ладно, я довольна. Можешь считать, что заслужил моё доверие!" }
  - say: { who: "Главный герой", text: "C-спасибо?" }
  - say: { who: "Марин", text: "Повезло же тебе, что я тебя поймала. Другие не были бы так милы с тобой" }
  - say: { who: "Главный герой", text: "В каком это смы-" }
  - jump: "kenma_hello"

# ----- Встреча с Кенмой -----
---
label: kenma_hello
nodes:
  - bg: "bg/kenma.png"
  - say: { who: "???", text: "Сколько можно уже здесь болтать? Вы мешаете мне играть" }
  
  - choice:
      text: "Что мне ответить?"
      options:
        - { text: "Нагрубить", jump: "kenma_angry" }
        - { text: "Извиниться", jump: "kenma_normal" }

---
label: kenma_angry
nodes:
  - say: { who: "Главный герой", text: "А ты вообще кто такой, чтобы нам указывать? Мы же в универе, иди поиграй в другом месте" }
  - say: { who: "Кенма", text: "Я - Кенма. А ты - тот, кто такими темпами отсюда не выберется"}
  - say: { who: "Главный герой", text: "Да к-как..." }
  - say: { who: "Кенма", text: "Замолчи. Ты уже потерял моё доверие. Сейчас придёт Умару, попробуй реабилитироваться уже с ней"}
  - say: { who: "Главный герой", text: "Грубиян" }
  - add_score: 0
  - jump: "after_kenma"

---
label: kenma_normal
nodes:
  - say: { who: "Главный герой", text: "Извини, мы просто обсуждали аниме" }
  - say: { who: "Кенма", text: "А, так за аниме даже я шарю" }
  - say: { who: "Кенма", text: "Но по тебе так совсем не скажешь. Ответь мне на один вопрос..." }
  
  - choice:
      text: "Какое аниме лишнее?"
      options:
        - { text: "Ван Пис", jump: "q3_wrong" }
        - { text: "Наруто", jump: "q3_wrong" }
        - { text: "Шарлотта", jump: "q3_correct" }
        - { text: "Покемон", jump: "q3_wrong" }

---
label: q3_correct
nodes:
  - say: { who: "Кенма", text: "...Норм. Ты не безнадёжен" }
  - add_score: 1
  - jump: "after_kenma"

---
label: q3_wrong
nodes:
  - say: { who: "Кенма", text: "...Неправильно" }
  - add_score: 0
  - jump: "after_kenma"

---
label: after_kenma
nodes:
  # ----- Встреча с Умару -----
  - bg: "bg/umaru.png"
  - say: { who: "???", text: "Ой-ой-ой! А меня пропустили? Я тоже хочу позадавать вопросы!" }
  - say: { who: "Главный герой", text: "Ребёнок?" }
  - say: { who: "Умару", text: "Я не ребенок! Я - Умару!" }
  - say: { who: "Умару", text: "И я тут главная специалистка по аниме-отзывам! Так что отвечай..." }

  - bg: "bg/umaru_q1.png"
  # ВОПРОС 4
  - choice:
      text: "О каком аниме этот отзыв?"
      options:
        - { text: "Магическая битва", jump: "q4_wrong" }
        - { text: "Ванпанчмен", jump: "q4_correct" }
        - { text: "Наруто", jump: "q4_wrong" }
        - { text: "Атака Титанов", jump: "q4_wrong" }

---
label: q4_correct
nodes:
  - say: { who: "Умару", text: "Угадал! Ты получил моё доверие!" }
  - add_score: 1
  - jump: "after_umaru"

---
label: q4_wrong
nodes:
  - say: { who: "Умару", text: "Да блин, как это можно не знать?" }
  - add_score: 0
  - jump: "after_umaru"

---
label: after_umaru
nodes:
  - bg: "bg/marin_alfa.png"
  - say: { who: "Марин", text: "Вау, ты ответил на все наши вопросы" }
  - say: { who: "Главный герой", text: "Я хотя бы попытался..." }
  - say: { who: "Марин", text: "Ха-ха. Теперь тебе в ГК. Там твой финиш" }
  - say: { who: "Марин", text: "Помни, если портал там - то ты будешь завтра дома, если нет - то тебе стоит посмотреть хотя бы одно аниме" }
  - say: { who: "Главный герой", text: "Чёрт, я не хотел тащиться в ГК хотя бы тут..." }
  
  # --- ПОДСЧЁТ ОЧКОВ И ВЫБОР КОНЦОВКИ ---
  - cond:
      condition: "score > maxScore / 2"
      jump: "good_ending"
      jump_if_false: "bad_ending"

# ============================================
# ХОРОШАЯ КОНЦОВКА
# ============================================
---
label: good_ending
nodes:
  - bg: "bg/good_end.png"
  - music: "audio/good_end.mp3"
  - say: { who: "Главный герой", text: "О мой Бог... У меня получилось! Я вернусь домой!" }
  - say: { who: "Главный герой", text: "Что ж... Пока, аниме-мир. Спасибо за это приключение..." }
  - say: { who: "Автор", text: "Ты заходишь в портал полный чувств благодарности и любви к аниме. Ты доказал, что ты настоящий отаку!" }
  - end: true

# ============================================
# ПЛОХАЯ КОНЦОВКА
# ============================================
---
label: bad_ending
nodes:
  - bg: "bg/bad_end.png"
  - music: "audio/bad_end.mp3"
  - say: { who: "Эрен", text: "К сожалению, ты не смог набрать достаточно очков..." }
  - say: { who: "Главный герой", text: "Ч-что??? Ты кто такой??" }
  - say: { who: "Эрен", text: "Я - Эрен Йегер, обладатель силы титана-прародителя. И мне очень жаль, что твой конец будет таковым" }
  - say: { who: "Главный герой", text: "А? Каким?" }
  - say: { who: "Эрен", text: "Таким. Ты будешь вечность ходить на пары. Вечность сдавать одни и те же лабы. Вечность сидеть за партой с грубым Кенмой. Портал не откроется." }
  - say: { who: "Главный герой", text: "О нет. Нет! Нет! Нет! Почему об этом говоришь мне именно ты?" }
  - say: { who: "Эрен", text: "Потому что именно я знаю о том, какая на самом деле вечность..." }
  - end: true